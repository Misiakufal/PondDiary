name: Pond Diary
version: "1.1.0"
slug: pond_diary
description: Track pond water tests, treatments, and pond photos from a mobile-friendly web app.
arch:
  - amd64
  - aarch64
  - armv7
startup: application
boot: auto
init: false
webui: http://[HOST]:[PORT:8099]
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: Pond Diary web interface
map:
  - addon_config:rw
options:
  default_mode: water_test
  black_mode: false
schema:
  default_mode: list(water_test|product|photo)
  black_mode: bool
