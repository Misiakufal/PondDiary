name: Pond Diary
version: "1.4.1"
slug: pond_diary
description: Track pond water tests, treatments, and pond photos from a mobile-friendly web app.
arch:
  - amd64
  - aarch64
  - armv7
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
ingress_entry: /
panel_title: Pond Diary
panel_icon: mdi:fishbowl
panel_admin: false
webui: http://[HOST]:[PORT:8099]
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: Pond Diary web interface
map:
  - addon_config:rw
options:
  default_mode: water_test
  black_mode: false
schema:
  default_mode: str
  black_mode: bool


